services:
  - type: web
    name: quantize-akshare-bridge
    runtime: python
    rootDir: data-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: AKSHARE_CACHE_TTL_SECONDS
        value: "900"
      - key: AKSHARE_HISTORY_DAYS
        value: "90"
      - key: AKSHARE_LOOKBACK_BUFFER_DAYS
        value: "160"
      - key: AKSHARE_MAX_SYMBOLS
        value: "30"
      - key: AKSHARE_SNAPSHOT_TIMEOUT_SECONDS
        value: "75"
